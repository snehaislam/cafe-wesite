<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
</head>

<body>

<h2>Your Cart</h2>
<ul id="cartItems"></ul>
<h3 id="total"></h3>

<select>
<option>Cash</option>
<option>Credit Card</option>
<option>Debit Card</option>
</select>

<button onclick="placeOrder()">Place Order</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

cart.forEach(item => {
document.getElementById("cartItems").innerHTML += `<li>${item.name} - $${item.price}</li>`;
total += item.price;
});

document.getElementById("total").innerText = "Total: $" + total;

function placeOrder(){
alert("Order placed!");
localStorage.removeItem("cart");
}
</script>

</body>
</html>
